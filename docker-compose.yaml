services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - crazy_chat_rabbitmq_data:/var/lib/rabbitmq

  mongo:
    image: mongo
    container_name: mongo
    ports:
      - 27017:27017
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        bash -c "echo 'try { rs.status() } catch (err) { rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"localhost:27017\"}]}) }' | mongosh --port 27017 --quiet"
      interval: 5s
      timeout: 30s
      start_period: 5s
      retries: 30
    volumes:
      - crazy_chat_mongo_data:/data/db

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - crazy_chat_minio_data:/data

volumes:
  crazy_chat_rabbitmq_data:
  crazy_chat_mongo_data:
  crazy_chat_minio_data:

